on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:21-jdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make mvnw executable
        run: |
          if [ -f "./mvnw" ]; then
            chmod +x ./mvnw
          fi

      - name: Build with Maven
        run: |
          if [ -f "./mvnw" ]; then
            ./mvnw clean package
          else
            mvn clean package
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifact
          path: ./target/*.jar

  sast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        run: |
          pip install semgrep
          semgrep scan --sarif --output semgrep.sarif --config auto . || true

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  sca:
    runs-on: ubuntu-latest
    needs: build
    container:
      image: eclipse-temurin:21-jdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make mvnw executable
        run: |
          if [ -f "./mvnw" ]; then
            chmod +x ./mvnw
          fi

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -f "./mvnw" ]; then
            ./mvnw dependency-check:check -Dnvd.api.key=$NVD_API_KEY || true
          else
            mvn dependency-check:check -Dnvd.api.key=$NVD_API_KEY || true
          fi

      - name: Upload SCA report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  dast-baseline:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-artifact
          path: ./target

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Start application
        run: java -jar ./target/*.jar &

      - name: Wait for application to start
        run: sleep 30

      - name: Run ZAP Baseline Scan
        run: |
          chmod 777 .
          touch zap-rules.tsv
          docker run --network=host \
            -v $(pwd):/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8080 \
            -r zap-baseline-report.html \
            -c zap-rules.tsv || true

      - name: Upload Baseline report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: zap-baseline-report.html

  dast-api:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-artifact
          path: ./target

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Start application
        run: java -jar ./target/*.jar &

      - name: Wait for application to start
        run: sleep 30

      - name: Run ZAP API Scan
        run: |
          chmod 777 .
          touch zap-rules.tsv
          docker run --network=host \
            -v $(pwd):/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
            -t http://localhost:8080/v3/api-docs \
            -f openapi \
            -r zap-api-report.html \
            -c zap-rules.tsv || true

      - name: Upload API report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-api-report
          path: zap-api-report.html