name: Secure Build Pipeline

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # для ручного запуска

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks Scan (Current Files Only)
        run: |
          docker run --rm -v ${{ github.workspace }}:/code zricethezav/gitleaks:latest detect --source="/code" --no-git -v

      # ДОБАВЛЕНО: Сохранение отчета о секретах
      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: |
            ${{ github.workspace }}/gitleaks-report.json
          retention-days: 30

  build-test-security:
    needs: [secrets-scan]
    runs-on: ubuntu-latest

    # ДОБАВЛЕНО: Настройка безопасности окружения
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # для корректного SAST

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      # ДОБАВЛЕНО: Линтер безопасности зависимостей
      - name: OWASP Dependency Check with fail on critical
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=ALL \
            -DprettyPrint=true

      # ДОБАВЛЕНО: Более полный SAST с SpotBugs + FindSecBugs
      - name: SpotBugs Security Scan
        run: |
          ./mvnw com.github.spotbugs:spotbugs-maven-plugin:check \
            -Dspotbugs.effort=Max \
            -Dspotbugs.threshold=Low \
            -Dspotbugs.includeFilter=security-include.xml

      - name: Semgrep SAST scan
        run: |
          docker run --rm -v $(pwd):/src semgrep/semgrep semgrep scan \
            --config auto \
            --config p/owasp-top-ten \
            --config p/java \
            --sarif --output report.sarif

      # ДОБАВЛЕНО: Сохранение SAST результатов
      - name: Upload SAST report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: report.sarif

      - name: Save Semgrep JSON report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-json-report
          path: |
            report.sarif
            semgrep-results.json

      - name: Dependency Check SCA
        run: ./mvnw dependency-check:check

      - name: Upload SCA Report
        uses: actions/upload-artifact@v4
        with:
          name: sca-report
          path: target/dependency-check-report.html

      # ДОБАВЛЕНО: SAST с CodeQL (более глубокая)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
          upload: true

      # ДОБАВЛЕНО: Тестирование с покрытием (для выявления логических уязвимостей)
      - name: Run tests with coverage
        run: ./mvnw test jacoco:report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: Run App for DAST
        run: |
          nohup java -jar target/*.jar > app.log 2>&1 &
          sleep 30
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8080/actuator/health || true

      # ДОБАВЛЕНО: API Security Scan (OpenAPI/Swagger)
      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.8.0
        with:
          target: 'http://localhost:8080'
          format: 'openapi'
          url: 'http://localhost:8080/v3/api-docs'

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: 'zap-rules.tsv'
          fail_action: false

      # ДОБАВЛЕНО: Сохранение DAST отчета
      - name: Save ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            zap.out

      # ДОБАВЛЕНО: Проверка на известные CVE в Docker образе (если используете Docker)
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 7

      # ДОБАВЛЕНО: Автоматическое создание issue при критических уязвимостях
      - name: Create Security Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issues = [];
            
            // Парсим отчеты и создаем issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security Vulnerabilities Found',
              body: 'В пайплайне обнаружены уязвимости. Проверьте артефакты сборки.',
              labels: ['security', 'critical']
            });