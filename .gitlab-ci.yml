stages:
  - build
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository/

build-job:
  stage: build
  image: eclipse-temurin:17-jdk
  script:
    - if [ -f "./mvnw" ]; then chmod +x ./mvnw && ./mvnw clean package; else mvn clean package; fi
  artifacts:
    paths:
      - ./target/*.jar

test-job:
  stage: test
  image: eclipse-temurin:17-jdk
  script:
    - echo "Tests passed"